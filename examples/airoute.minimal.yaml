version: 1

server:
  listen: 127.0.0.1:12666
  admin_listen: 127.0.0.1:12667
  max_concurrent: 256
  max_headers: 100
  max_header_bytes: 1048576

admin:
  enabled: true

auth:
  enabled: false

providers: []
routes: []

conversion:
  unsupported_fields: warn

logging:
  level: info
  request_history: 50

metrics:
  enabled: true
  path: /metrics
