openapi: 3.1.0
info:
  title: AI Router Management API
  version: 1.0.0
  description: 管理控制面 API。模型网关端点保持各自供应商的原生 Schema。
servers:
  - url: http://127.0.0.1:12667
security:
  - bearerAuth: []
paths:
  /api/status:
    get:
      summary: 获取服务、配置和指标状态
      responses:
        "200": { description: Current status, content: { application/json: { schema: { type: object } } } }
  /api/config:
    get:
      summary: 获取原始 YAML 和脱敏配置
      responses:
        "200": { description: Configuration, content: { application/json: { schema: { $ref: "#/components/schemas/ConfigEnvelope" } } } }
    put:
      summary: 原子保存配置并返回真实生效分类
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml, expected_hash]
              properties:
                yaml: { type: string }
                expected_hash: { type: string }
      responses:
        "200": { description: Saved, content: { application/json: { schema: { $ref: "#/components/schemas/ConfigSaveResult" } } } }
        "409": { description: Configuration changed concurrently }
        "422": { description: Invalid configuration }
  /api/config/validate:
    post:
      summary: 校验配置但不保存
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [yaml], properties: { yaml: { type: string } } } } }
      responses:
        "200": { description: Valid }
        "422": { description: Invalid }
  /api/config/reload:
    post:
      summary: 从磁盘重新加载配置
      responses: { "200": { description: Reloaded } }
  /api/config/backups:
    get:
      summary: 列出配置备份（标注是否可能包含本地明文密钥）
      responses: { "200": { description: Backups } }
  /api/config/rollback:
    post:
      summary: 回滚配置备份
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string } } } } }
      responses: { "200": { description: Rolled back }, "422": { description: Backup invalid } }
  /api/providers:
    get:
      summary: 获取脱敏 Provider 列表
      responses: { "200": { description: Providers } }
  /api/apps:
    get:
      summary: 获取应用 Manifest、能力和安装检测结果
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: object
                required: [apps]
                properties:
                  apps:
                    type: array
                    items:
                      type: object
                      required: [manifest, detection]
                      properties:
                        manifest: { $ref: "#/components/schemas/ApplicationManifest" }
                        detection: { $ref: "#/components/schemas/ApplicationDetection" }
  /api/apps/{id}:
    get:
      summary: 读取应用检测状态和已脱敏的托管配置
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      responses:
        "200": { description: Application state, content: { application/json: { schema: { $ref: "#/components/schemas/ApplicationState" } } } }
        "404": { description: Unknown application }
        "422": { description: Invalid application configuration }
  /api/apps/{id}/preview:
    post:
      summary: 预览结构化合并结果与脱敏 Diff，不写文件
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        "200": { description: Redacted preview, content: { application/json: { schema: { $ref: "#/components/schemas/ApplicationPreview" } } } }
        "422": { description: Invalid desired configuration }
  /api/apps/{id}/config:
    put:
      summary: 原子写入应用配置并创建 0600 备份
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        "200": { description: Applied, content: { application/json: { schema: { $ref: "#/components/schemas/ApplicationApplyResult" } } } }
        "422": { description: Apply failed }
  /api/apps/{id}/verify:
    post:
      summary: 执行应用声明的分层验证；run_cli 只启用 Adapter 内置固定 Smoke
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config: { type: object, description: 可选的待验证配置；不会写入文件 }
                run_cli: { type: boolean, default: false }
      responses:
        "200": { description: Verification stages, content: { application/json: { schema: { $ref: "#/components/schemas/ApplicationVerifyResult" } } } }
        "422": { description: Verification could not be executed }
  /api/apps/{id}/backups:
    get:
      summary: 列出应用配置备份
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      responses:
        "200":
          description: Backups
          content:
            application/json:
              schema:
                type: object
                required: [backups]
                properties:
                  backups: { type: array, items: { $ref: "#/components/schemas/ApplicationBackup" } }
  /api/apps/{id}/rollback:
    post:
      summary: 从受限备份名回滚并重新校验应用配置
      parameters: [{ $ref: "#/components/parameters/ApplicationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string } }
      responses:
        "200": { description: Rolled back, content: { application/json: { schema: { $ref: "#/components/schemas/ApplicationApplyResult" } } } }
        "422": { description: Invalid backup or rollback failure }
  /api/providers/{id}/probe:
    post:
      summary: 探测 Provider、发现模型并可选发送最小测试请求
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                test_request: { type: boolean, default: false }
      responses: { "200": { description: Probe report } }
  /api/routes/explain:
    get:
      summary: 通过请求特征解释路由选择
      parameters:
        - { name: protocol, in: query, required: true, schema: { $ref: "#/components/schemas/Protocol" } }
        - { name: model, in: query, required: true, schema: { type: string } }
        - { name: stream, in: query, schema: { type: boolean } }
        - { name: tools, in: query, schema: { type: boolean } }
        - { name: image, in: query, schema: { type: boolean } }
        - { name: header, in: query, description: "可重复的 Name:value 条件", schema: { type: array, items: { type: string } } }
      responses: { "200": { description: Decision and canonical request }, "404": { description: No route } }
    post:
      summary: 通过完整协议请求解释路由选择
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocol, request]
              properties:
                protocol: { $ref: "#/components/schemas/Protocol" }
                request: { type: object }
                headers: { type: object, additionalProperties: { type: string } }
      responses: { "200": { description: Decision and canonical request }, "404": { description: No route } }
  /api/playground/preview:
    post:
      summary: 预览 Canonical IR、路由和上游请求，不访问 Provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocol, request]
              properties:
                protocol: { $ref: "#/components/schemas/Protocol" }
                request: { type: object }
                headers: { type: object, additionalProperties: { type: string } }
      responses: { "200": { description: Canonical request, route decision, upstream request and diagnostics } }
  /api/playground/request:
    post:
      summary: 通过本地网关发送测试请求
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [protocol, body], properties: { protocol: { $ref: "#/components/schemas/Protocol" }, body: { type: object } } } } }
      responses: { "200": { description: Gateway response envelope } }
  /api/logs:
    get:
      summary: 获取最近请求日志
      parameters: [{ name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100000 } }]
      responses: { "200": { description: Logs } }
  /api/logs/{requestId}:
    get:
      summary: 获取请求详情
      parameters: [{ name: requestId, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Log detail }, "404": { description: Not found } }
  /api/metrics/summary:
    get:
      summary: 获取聚合指标
      responses: { "200": { description: Metrics } }
  /api/diagnostics:
    get:
      summary: 导出自动脱敏的诊断包及内容清单
      responses:
        "200":
          description: Redacted diagnostic bundle
          headers:
            Content-Disposition: { schema: { type: string } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  parameters:
    ApplicationId:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    Protocol:
      type: string
      enum: [openai-chat, openai-responses, anthropic-messages, gemini-generate-content]
    ConfigEnvelope:
      type: object
      required: [yaml, hash, config]
      properties:
        yaml: { type: string }
        hash: { type: string }
        config: { type: object }
    ConfigSaveResult:
      type: object
      required: [ok, hash, hot_reloaded, runtime_rebuilt, restart_required]
      properties:
        ok: { type: boolean }
        hash: { type: string }
        backup: { type: string }
        hot_reloaded: { type: array, items: { type: string } }
        runtime_rebuilt: { type: array, items: { type: string } }
        restart_required: { type: array, items: { type: string } }
    ApplicationManifest:
      type: object
      required: [id, name, description, status, capabilities, config_format]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string }
        capabilities:
          type: array
          items: { type: string, enum: [detect, configure, preview, verify, rollback] }
        config_format: { type: string }
    ApplicationDetection:
      type: object
      required: [installed]
      properties:
        installed: { type: boolean }
        executable: { type: string }
        version: { type: string }
        message: { type: string }
    ApplicationState:
      type: object
      required: [manifest, detection, path, exists, managed, preserved_fields, synced]
      properties:
        manifest: { $ref: "#/components/schemas/ApplicationManifest" }
        detection: { $ref: "#/components/schemas/ApplicationDetection" }
        path: { type: string }
        exists: { type: boolean }
        managed: { type: object, description: API Key 只返回 api_key_set，不返回值 }
        preserved_fields: { type: integer, minimum: 0 }
        synced: { type: boolean }
    ApplicationPreview:
      type: object
      required: [path, content, diff, preserved_fields, will_create_backup]
      properties:
        path: { type: string }
        content: { type: object, description: 敏感字段已遮罩 }
        diff: { type: string, description: 敏感字段已遮罩 }
        preserved_fields: { type: integer, minimum: 0 }
        will_create_backup: { type: boolean }
    ApplicationApplyResult:
      type: object
      required: [ok, path]
      properties:
        ok: { type: boolean }
        path: { type: string }
        backup: { type: string }
    ApplicationVerifyStage:
      type: object
      required: [id, label, ok, message]
      properties:
        id: { type: string }
        label: { type: string }
        ok: { type: boolean }
        message: { type: string }
        detail: { type: string, description: 已截断并脱敏 }
        latency_ms: { type: integer, minimum: 0 }
    ApplicationVerifyResult:
      type: object
      required: [ok, verified_at, stages]
      properties:
        ok: { type: boolean }
        verified_at: { type: string, format: date-time }
        stages: { type: array, items: { $ref: "#/components/schemas/ApplicationVerifyStage" } }
    ApplicationBackup:
      type: object
      required: [name, path, size, modified_at, contains_sensitive_config]
      properties:
        name: { type: string }
        path: { type: string }
        size: { type: integer, minimum: 0 }
        modified_at: { type: string, format: date-time }
        contains_sensitive_config: { type: boolean }
