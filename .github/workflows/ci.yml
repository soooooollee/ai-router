name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.24.x", cache: true }
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            npm/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm run test
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: npm run test:e2e
        working-directory: web
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./cmd/airoute
      - run: ./scripts/test-lifecycle.sh
      - uses: golang/govulncheck-action@v1
        with: { go-version-input: "1.25.x", go-package: ./..., cache: false }
      - run: go run github.com/google/go-licenses/v2@v2.0.1 check ./...
      - run: npm audit --audit-level=high
        working-directory: web
      - run: npm ci --ignore-scripts
        working-directory: npm
      - run: npm test
        working-directory: npm
      - run: npm pack --dry-run
        working-directory: npm
      - run: >-
          npx --yes license-checker-rseidelsohn@4.4.2 --production
          --excludePackages 'airoute-web@0.2.3'
          --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;BlueOak-1.0.0;CC-BY-4.0;Python-2.0'
          --summary
        working-directory: web
  platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.24.x", cache: true }
      - run: go build -trimpath -o air-smoke${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/airoute
      - run: go run ./cmd/airoute version
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with: { context: ., push: false, tags: "airoute:ci" }
