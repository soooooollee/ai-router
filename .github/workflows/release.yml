name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v6
        with: { go-version: "1.24.x", cache: true }
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            npm/package-lock.json
          registry-url: https://registry.npmjs.org
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with: { distribution: goreleaser, version: "2.17.0", args: release --clean }
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums with GitHub OIDC
        run: cosign sign-blob --yes --bundle dist/checksums.txt.bundle dist/checksums.txt
      - name: Attach checksum signature
        run: gh release upload "${GITHUB_REF_NAME}" dist/checksums.txt.bundle --clobber
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Set npm package version
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Test npm package
        working-directory: npm
        run: npm ci --ignore-scripts && npm test
      - name: Publish npm package
        if: env.NPM_TOKEN != ''
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: "${{ env.NPM_TOKEN }}"
      - name: Report skipped npm publish
        if: env.NPM_TOKEN == ''
        run: echo "npm publish skipped because the NPM_TOKEN repository secret is not configured."
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
